services:
  - type: web
    name: nova-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: nova
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
